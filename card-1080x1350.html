<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cartão Laura 1080x1350</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="card-page">
    <article class="invite-card size-feed" aria-label="Cartão de convite 1080 por 1350">
      <span class="card-shine"></span>
      <span class="card-flower card-flower-one"></span>
      <span class="card-flower card-flower-two"></span>
      <span class="card-leaf card-leaf-one"></span>
      <span class="card-leaf card-leaf-two"></span>
      <span class="card-balloon card-balloon-one"></span>
      <span class="card-balloon card-balloon-two"></span>
      <div class="card-photo-wrap">
        <img src="assets/laura-stitch-theme.png" alt="Laura em cenário tropical do tema Stitch" onerror="this.classList.add('is-missing')">
        <div class="photo-placeholder card-placeholder"><span>Foto da Laura</span></div>
      </div>
      <div class="card-mascot" aria-hidden="true">
        <span class="alien-ear left"></span>
        <span class="alien-ear right"></span>
        <span class="alien-face"><i class="eye left"></i><i class="eye right"></i><i class="nose"></i><i class="smile"></i></span>
      </div>
      <div class="card-copy">
        <h1>Laura faz 6 anos!</h1>
        <p class="special">Você é nosso convidado especial!</p>
        <div class="card-info">
          <p>📅 05/07/2026</p>
          <p>🕘 A partir das 09h</p>
          <p>📍 Rua Francisco Arruda, 330</p>
          <p>Conjunto Tiradentes</p>
        </div>
        <strong>Esperamos você!</strong>
      </div>
    </article>
  </body>
</html>
